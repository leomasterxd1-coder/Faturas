<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controle de Faturas</title>
    
    <!-- Bibliotecas para exportação -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.2.0/build/index.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pptxgenjs/3.12.0/pptxgen.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0a0a 0%, #1a1a2e 100%);
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            color: #e0e0e0;
            padding: 16px;
            padding-top: 80px;
            min-height: 100vh;
        }

        h1, h2, h3 {
            font-weight: 300;
            letter-spacing: -0.5px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #fff 0%, #a0c0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Botões flutuantes superiores */
        .top-buttons {
            position: fixed;
            top: 16px;
            right: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-end;
            z-index: 1000;
            background: rgba(10, 20, 40, 0.7);
            backdrop-filter: blur(12px);
            padding: 10px 16px;
            border-radius: 50px;
            border: 1px solid #2a3a5a;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }

        /* Design moderno de botões */
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            background: #1e2a3a;
            color: #ccd9ff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #2e3f5a;
        }

        .btn:hover {
            background: #2a3c5a;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 14px rgba(0,0,0,0.4);
        }

        .btn-primary {
            background: #1e3a5f;
            border-color: #3a6a9f;
            color: white;
        }

        .btn-success {
            background: #0f4d2e;
            border-color: #1e8a4d;
            color: white;
        }

        .btn-share {
            background: #3a2a5a;
            border-color: #7a5aaa;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.8rem;
        }

        input, select {
            padding: 12px 16px;
            margin: 6px 0;
            border-radius: 30px;
            border: 1px solid #2a3f5a;
            background: #0f1a24;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        input:focus, select:focus {
            border-color: #3a7bd5;
            box-shadow: 0 0 0 3px rgba(58, 123, 213, 0.2);
        }

        .card {
            background: rgba(18, 28, 40, 0.85);
            backdrop-filter: blur(10px);
            padding: 24px;
            margin-top: 24px;
            border-radius: 32px;
            border: 1px solid #1e3349;
            box-shadow: 0 20px 36px -8px black;
        }

        /* Resumo dos bancos (balões coloridos) */
        .bancos-resumo {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin: 20px 0;
        }

        .banco-balao {
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 6px 0 rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            font-size: 1.1rem;
            transition: transform 0.1s;
            position: relative;
            flex: 0 1 auto;
        }

        .banco-balao span {
            background: rgba(0,0,0,0.35);
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 700;
        }

        /* Cards de fatura dos bancos */
        .fatura-banco-item {
            background: #0d1624;
            padding: 16px;
            border-radius: 20px;
            margin-bottom: 12px;
            border: 1px solid #2a3f5a;
        }

        .fatura-banco-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .progress-bar {
            height: 8px;
            background: #1a273a;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .pessoa {
            background: #0e1622;
            padding: 18px;
            margin-top: 18px;
            border-radius: 28px;
            border-left: 6px solid #2a4a7a;
            position: relative;
            box-shadow: 0 8px 0 #050a0f;
        }

        .nomePessoa {
            font-size: 1.6rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            color: #c6daff;
        }

        .totalPessoa {
            font-size: 1.4rem;
            font-weight: 700;
            margin-top: 18px;
            padding-top: 12px;
            border-top: 2px dashed #2a4a7a;
            color: #b8d0ff;
        }

        /* Balão de informação de cada compra */
        .fatura-item {
            background: #0b121c;
            margin: 10px 0;
            padding: 14px 18px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            position: relative;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        }

        /* Botão X no canto superior direito de cada balão */
        .btn-remover-item {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #1f1f2e;
            border: 2px solid #4a4a6a;
            color: #ff7b7b;
            width: 32px;
            height: 32px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px black;
            transition: 0.1s;
            z-index: 5;
        }

        .btn-remover-item:hover {
            background: #ff3b3b;
            color: white;
            border-color: white;
            transform: scale(1.1);
        }

        /* Edição inline de parcelas/valor */
        .editar-parcela, .editar-valor {
            background: #1a273a;
            border: 1px solid #2e4a6a;
            color: white;
            padding: 6px 12px;
            border-radius: 40px;
            width: 110px;
            font-size: 0.9rem;
        }

        .btn-atualizar {
            background: #1f4a6e;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .grid-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            align-items: end;
        }

        .soma-total-geral-verde {
            background: #0a331a;
            border: 2px solid #1f9e4d;
            border-radius: 50px;
            padding: 18px 28px;
            margin-top: 30px;
            text-align: center;
            font-size: 2.2rem;
            font-weight: 800;
            color: #b0ffb0;
            text-shadow: 0 2px 8px #003300;
            box-shadow: 0 8px 0 #06200e;
        }

        .saldo-disponivel {
            font-size: 1.3rem;
            font-weight: 600;
            margin-top: 8px;
        }

        .saldo-positivo {
            color: #4ade80;
        }

        .saldo-negativo {
            color: #f87171;
        }

        /* Ajustes mobile */
        @media (max-width: 600px) {
            body { padding-top: 130px; }
            .top-buttons { top: 8px; right: 8px; left: 8px; border-radius: 30px; }
        }
    </style>
</head>
<body>

<!-- Botões de exportação e compartilhar -->
<div class="top-buttons">
    <button class="btn" onclick="exportarImagem()">📸 Imagem</button>
    <button class="btn" onclick="exportarExcel()">📊 Excel</button>
    <button class="btn" onclick="exportarPDF()">📄 PDF</button>
    <button class="btn" onclick="exportarDOCX()">📝 DOCX</button>
    <button class="btn" onclick="exportarPPTX()">📽️ PPTX</button>
    <button class="btn btn-share" onclick="compartilhar()">🔗 Compartilhar</button>
</div>

<h1>💳 Controle de Faturas</h1>

<!-- SEÇÃO: Cadastro de Fatura Total por Banco -->
<div class="card">
    <h2 style="margin-top: 0;">📋 Cadastrar Fatura do Banco</h2>
    <div class="grid-form">
        <select id="bancoFaturaSelect" style="background:#0f1a24;">
            <option value="">Selecione o banco</option>
        </select>
        <input id="valorFaturaBanco" type="number" step="0.01" placeholder="Valor total da fatura R$">
        <button class="btn btn-primary" onclick="adicionarFaturaBanco()">➕ Adicionar Fatura</button>
    </div>
</div>

<!-- SEÇÃO: Resumo das Faturas dos Bancos com Subtração -->
<div id="resumoFaturasBancos" class="card" style="padding: 20px;">
    <h2 style="margin-top: 0;">🏦 Faturas dos Bancos</h2>
    <div id="listaFaturasBancos"></div>
</div>

<!-- Resumo dos bancos com cores predominantes (balões com totais gastos) -->
<div id="resumoBancos" class="card" style="padding: 20px;">
    <h2 style="margin-top: 0;">📊 Gastos por Banco</h2>
    <div id="bancosBalões" class="bancos-resumo"></div>
</div>

<!-- Formulário de adição de gastos -->
<div class="card">
    <h2 style="margin-top: 0;">➕ Adicionar Gasto</h2>
    <div class="grid-form">
        <input id="nome" placeholder="Nome da pessoa" autocomplete="off">
        <select id="bancoSelect" style="background:#0f1a24;">
            <option value="">Selecione o banco</option>
        </select>
        <input id="descricao" placeholder="Descrição">
        <input id="valor" type="number" step="0.01" placeholder="Valor R$">
        <input id="parcela" placeholder="Parcela (ex: 3/10)">
        <button class="btn btn-primary" onclick="adicionar()" style="grid-column: span 2;">➕ Adicionar Gasto</button>
    </div>
</div>

<!-- Lista de pessoas e faturas -->
<div id="lista"></div>

<!-- Soma total geral em destaque verde -->
<div id="totalGeralVerde" class="soma-total-geral-verde">R$ 0,00</div>

<script>
    (function() {
        "use strict";

        // Lista completa de bancos brasileiros (2026)
        const BANCOS_BRASIL = [
            "Banco do Brasil", "Itaú Unibanco", "Bradesco", "Caixa Econômica Federal", "Santander",
            "BTG Pactual", "Safra", "Banrisul", "Banco Inter", "Nubank", "C6 Bank", "Mercado Pago",
            "PicPay", "PagBank", "Agibank", "BMG", "Daycoval", "Pan", "Original", "Sicoob",
            "Sicredi", "Neon", "Will Bank", "Next", "Digio", "BS2", "Rendimento", "Tribanco",
            "Banco da Amazônia", "BNB", "BRB", "Basa", "Bamisul", "ABC Brasil", "Alfa",
            "Votorantim", "Modal", "Sofisa", "Pine", "Industrial do Brasil", "Mercantil do Brasil",
            "Cooperativo Sicredi", "Unicred", "Cresol"
        ];

        // Mapeamento de cores predominantes por banco (2026)
        const CORES_BANCO = {
            "Banco do Brasil": "#F4E033", "Itaú Unibanco": "#EC7000", "Bradesco": "#CC092F",
            "Caixa Econômica Federal": "#1C4C9C", "Santander": "#EC0000", "BTG Pactual": "#0C2C56",
            "Safra": "#003C7C", "Banrisul": "#003DA5", "Banco Inter": "#FF7A00", "Nubank": "#820AD1",
            "C6 Bank": "#000000", "Mercado Pago": "#00A4E4", "PicPay": "#21C25E", "PagBank": "#00A859",
            "Agibank": "#F27A23", "BMG": "#FF6600", "Pan": "#003B6F", "Original": "#00A857",
            "Sicoob": "#003F1F", "Sicredi": "#006633", "Neon": "#00A1E0", "Will Bank": "#FFD100",
            "Next": "#00B33C", "Digio": "#5C2D91", "BS2": "#ED7000", "default": "#2A4A7A"
        };

        let dados = []; // Gastos individuais
        let faturasBancos = []; // Faturas totais por banco

        // Preencher selects de bancos
        const selectBanco = document.getElementById('bancoSelect');
        const selectBancoFatura = document.getElementById('bancoFaturaSelect');
        
        BANCOS_BRASIL.sort().forEach(banco => {
            const option1 = document.createElement('option');
            option1.value = banco;
            option1.textContent = banco;
            selectBanco.appendChild(option1);
            
            const option2 = document.createElement('option');
            option2.value = banco;
            option2.textContent = banco;
            selectBancoFatura.appendChild(option2);
        });

        // Função para obter cor predominante
        function getCorBanco(nomeBanco) {
            return CORES_BANCO[nomeBanco] || CORES_BANCO['default'];
        }

        // Adicionar fatura total do banco
        window.adicionarFaturaBanco = function() {
            const banco = document.getElementById('bancoFaturaSelect').value;
            const valorTotal = parseFloat(document.getElementById('valorFaturaBanco').value);
            
            if (!banco || isNaN(valorTotal) || valorTotal <= 0) {
                alert('Selecione o banco e informe um valor válido.');
                return;
            }
            
            // Verificar se já existe fatura para este banco
            const existente = faturasBancos.findIndex(f => f.banco === banco);
            if (existente >= 0) {
                faturasBancos[existente].valorTotal = valorTotal;
            } else {
                faturasBancos.push({
                    id: gerarId(),
                    banco: banco,
                    valorTotal: valorTotal
                });
            }
            
            renderizar();
            document.getElementById('bancoFaturaSelect').value = '';
            document.getElementById('valorFaturaBanco').value = '';
        };

        // Remover fatura do banco
        window.removerFaturaBanco = function(id) {
            faturasBancos = faturasBancos.filter(f => f.id !== id);
            renderizar();
        };

        // Renderizar faturas dos bancos com subtração
        function renderizarFaturasBancos(totalGastoPorBanco) {
            const container = document.getElementById('listaFaturasBancos');
            
            if (faturasBancos.length === 0) {
                container.innerHTML = '<p style="text-align:center; opacity:0.7; padding:20px;">Nenhuma fatura de banco cadastrada. Adicione acima.</p>';
                return;
            }
            
            let html = '';
            faturasBancos.forEach(fatura => {
                const banco = fatura.banco;
                const valorTotal = fatura.valorTotal;
                const totalGasto = totalGastoPorBanco[banco] || 0;
                const saldoDisponivel = valorTotal - totalGasto;
                const percentualUsado = valorTotal > 0 ? (totalGasto / valorTotal) * 100 : 0;
                const corBanco = getCorBanco(banco);
                const corProgresso = saldoDisponivel >= 0 ? '#4ade80' : '#ef4444';
                
                html += `
                    <div class="fatura-banco-item">
                        <div class="fatura-banco-header">
                            <div style="display:flex; align-items:center; gap:10px; flex:1;">
                                <span style="background: ${corBanco}; width:16px; height:16px; border-radius:50%;"></span>
                                <strong style="font-size:1.2rem;">${banco}</strong>
                            </div>
                            <button class="btn-remover-item" onclick="removerFaturaBanco('${fatura.id}')" style="position:static; margin-left:auto;">✕</button>
                        </div>
                        
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin:12px 0;">
                            <div>
                                <div style="opacity:0.7; font-size:0.9rem;">Limite Total</div>
                                <div style="font-size:1.4rem; font-weight:700;">R$ ${valorTotal.toFixed(2)}</div>
                            </div>
                            <div>
                                <div style="opacity:0.7; font-size:0.9rem;">Total Gasto</div>
                                <div style="font-size:1.4rem; font-weight:700; color: ${corBanco};">R$ ${totalGasto.toFixed(2)}</div>
                            </div>
                        </div>
                        
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${Math.min(percentualUsado, 100)}%; background: ${corProgresso};"></div>
                        </div>
                        
                        <div class="saldo-disponivel ${saldoDisponivel >= 0 ? 'saldo-positivo' : 'saldo-negativo'}">
                            ${saldoDisponivel >= 0 ? '✅ Saldo Disponível' : '⚠️ Estouro de Limite'}: 
                            R$ ${Math.abs(saldoDisponivel).toFixed(2)}
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // Renderização completa
        function renderizar() {
            const listaDiv = document.getElementById('lista');
            const resumoBancosDiv = document.getElementById('bancosBalões');
            const totalGeralVerde = document.getElementById('totalGeralVerde');
            
            listaDiv.innerHTML = "";
            
            // Agrupar por pessoa
            const pessoas = {};
            dados.forEach(d => {
                if (!pessoas[d.nome]) pessoas[d.nome] = [];
                pessoas[d.nome].push(d);
            });

            // Totais por banco (para os balões)
            const totalPorBanco = {};
            let somaTotalGeral = 0;

            // Renderizar pessoas
            for (let nome in pessoas) {
                const divPessoa = document.createElement('div');
                divPessoa.className = 'pessoa';
                
                let totalPessoa = 0;
                let htmlFaturas = '';
                
                pessoas[nome].forEach((f, index) => {
                    totalPessoa += f.valor;
                    if (!totalPorBanco[f.banco]) totalPorBanco[f.banco] = 0;
                    totalPorBanco[f.banco] += f.valor;
                    
                    const corBanco = getCorBanco(f.banco);
                    
                    htmlFaturas += `
                        <div class="fatura-item" style="background: linear-gradient(145deg, #0b121c 0%, ${corBanco}20); border-left: 8px solid ${corBanco};">
                            <div style="flex:1;">
                                <strong style="color: ${corBanco};">${f.banco}</strong> • ${f.descricao} 
                                <span style="background: #1e3040; padding:4px 12px; border-radius:30px; margin:0 6px;">${f.parcela || '-'}</span>
                                <strong>R$ ${f.valor.toFixed(2)}</strong>
                            </div>
                            <div style="display:flex; gap:8px; align-items:center;">
                                <input type="text" class="editar-parcela" placeholder="Nova parcela" id="editParcela_${f.id}" value="${f.parcela}" style="width:100px;">
                                <input type="number" class="editar-valor" placeholder="Valor" id="editValor_${f.id}" value="${f.valor}" step="0.01" style="width:100px;">
                                <button class="btn-atualizar" onclick="atualizarFatura('${f.id}')">↻</button>
                            </div>
                            <div class="btn-remover-item" onclick="removerFatura('${f.id}')">✕</div>
                        </div>
                    `;
                });

                divPessoa.innerHTML = `
                    <div class="nomePessoa">👤 ${nome} 
                        <span style="font-size:0.9rem; background:#1e3a5f; padding:4px 14px; border-radius:30px;">${pessoas[nome].length} gastos</span>
                    </div>
                    ${htmlFaturas}
                    <div class="totalPessoa">💰 Total ${nome}: R$ ${totalPessoa.toFixed(2)}</div>
                `;
                listaDiv.appendChild(divPessoa);
                somaTotalGeral += totalPessoa;
            }

            // Renderizar faturas dos bancos com subtração
            renderizarFaturasBancos(totalPorBanco);

            // Renderizar balões dos bancos (com cores e total gasto)
            resumoBancosDiv.innerHTML = '';
            const bancosOrdenados = Object.keys(totalPorBanco).sort();
            
            if (bancosOrdenados.length === 0) {
                resumoBancosDiv.innerHTML = '<p style="width:100%; text-align:center; opacity:0.7;">Nenhum gasto registrado ainda.</p>';
            } else {
                bancosOrdenados.forEach(banco => {
                    const total = totalPorBanco[banco];
                    const cor = getCorBanco(banco);
                    const balao = document.createElement('div');
                    balao.className = 'banco-balao';
                    balao.style.backgroundColor = cor;
                    balao.style.color = (cor === '#F4E033' || cor === '#FFD100') ? '#000' : '#fff';
                    balao.innerHTML = `${banco} <span>R$ ${total.toFixed(2)}</span>`;
                    resumoBancosDiv.appendChild(balao);
                });
            }

            // Atualizar total geral verde
            totalGeralVerde.textContent = `💰 TOTAL GERAL GASTO: R$ ${somaTotalGeral.toFixed(2)}`;
        }

        // Função para gerar ID curto
        function gerarId() {
            return Date.now() + '-' + Math.random().toString(36).substr(2, 6);
        }

        // Adicionar gasto
        window.adicionar = function() {
            const nome = document.getElementById('nome').value.trim();
            const banco = document.getElementById('bancoSelect').value;
            const descricao = document.getElementById('descricao').value.trim();
            const valor = parseFloat(document.getElementById('valor').value);
            const parcela = document.getElementById('parcela').value.trim();

            if (!nome || !banco || !descricao || isNaN(valor) || valor <= 0) {
                alert('Preencha todos os campos corretamente.');
                return;
            }

            const novaFatura = {
                id: gerarId(),
                nome, banco, descricao, valor, parcela: parcela || '-'
            };
            dados.push(novaFatura);
            renderizar();
            
            // Limpar campos
            document.getElementById('nome').value = '';
            document.getElementById('bancoSelect').value = '';
            document.getElementById('descricao').value = '';
            document.getElementById('valor').value = '';
            document.getElementById('parcela').value = '';
        };

        // Remover gasto
        window.removerFatura = function(id) {
            dados = dados.filter(f => f.id !== id);
            renderizar();
        };

        // Atualizar parcela/valor
        window.atualizarFatura = function(id) {
            const inputParcela = document.getElementById(`editParcela_${id}`);
            const inputValor = document.getElementById(`editValor_${id}`);
            const fatura = dados.find(f => f.id === id);
            if (!fatura) return;
            
            const novaParcela = inputParcela.value.trim();
            const novoValor = parseFloat(inputValor.value);
            
            if (novaParcela) fatura.parcela = novaParcela;
            if (!isNaN(novoValor) && novoValor > 0) fatura.valor = novoValor;
            
            renderizar();
        };

        // Exportações
        window.exportarImagem = function() {
            html2canvas(document.body, { scale: 1.8, backgroundColor: '#0a0a0a' }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'faturas.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        };

        window.exportarExcel = function() {
            const ws = XLSX.utils.json_to_sheet(dados.map(d => ({ ...d })));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Gastos");
            XLSX.writeFile(wb, "faturas.xlsx");
        };

        window.exportarPDF = function() {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            pdf.setFontSize(16);
            pdf.text("Relatório de Faturas", 15, 20);
            let y = 30;
            dados.forEach(d => {
                pdf.setFontSize(11);
                pdf.text(`${d.nome} | ${d.banco} | ${d.descricao} | ${d.parcela} | R$${d.valor.toFixed(2)}`, 15, y);
                y += 8;
            });
            pdf.save("faturas.pdf");
        };

        window.exportarDOCX = function() {
            const { Document, Paragraph, TextRun, Packer } = window.docx;
            const children = dados.map(d => new Paragraph({
                children: [new TextRun(`${d.nome} - ${d.banco} - ${d.descricao} - ${d.parcela} - R$${d.valor.toFixed(2)}`)]
            }));
            const doc = new Document({ sections: [{ children }] });
            Packer.toBlob(doc).then(blob => {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = "faturas.docx";
                link.click();
            });
        };

        window.exportarPPTX = function() {
            let PptxGenJS = window.PptxGenJS;
            let pptx = new PptxGenJS();
            let slide = pptx.addSlide();
            slide.addText("Relatório de Faturas", { x: 1, y: 0.5, fontSize: 18, bold: true });
            let rows = dados.map(d => [d.nome, d.banco, d.descricao, d.parcela, `R$ ${d.valor.toFixed(2)}`]);
            slide.addTable([["Nome","Banco","Descrição","Parcela","Valor"], ...rows], { x: 0.5, y: 1.2, w: 9 });
            pptx.writeFile({ fileName: "faturas.pptx" });
        };

        window.compartilhar = function() {
            if (navigator.share) {
                navigator.share({
                    title: 'Faturas',
                    text: 'Confira o resumo de faturas.',
                    url: window.location.href
                }).catch(() => {});
            } else {
                alert('Compartilhar: ' + window.location.href);
            }
        };

        // Inicializar com dados de exemplo
        (function initDemo() {
            // Exemplo de faturas de bancos
            faturasBancos = [
                { id: gerarId(), banco: "Nubank", valorTotal: 5000.00 },
                { id: gerarId(), banco: "Itaú Unibanco", valorTotal: 8000.00 },
                { id: gerarId(), banco: "Banco do Brasil", valorTotal: 3000.00 }
            ];
            
            // Exemplo de gastos
            dados = [
                { id: gerarId(), nome: "Ana Silva", banco: "Nubank", descricao: "Ifood", valor: 89.90, parcela: "1/1" },
                { id: gerarId(), nome: "Carlos Souza", banco: "Itaú Unibanco", descricao: "Amazon", valor: 450.00, parcela: "2/6" },
                { id: gerarId(), nome: "Ana Silva", banco: "Banco do Brasil", descricao: "Posto", valor: 220.30, parcela: "1/3" },
                { id: gerarId(), nome: "Mariana", banco: "Nubank", descricao: "Uber", valor: 45.50, parcela: "1/1" },
            ];
            renderizar();
        })();

    })();
</script>
